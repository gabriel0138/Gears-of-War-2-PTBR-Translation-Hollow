.EnemyList=(EnemyType=AIType_Kantus,MinWave=6,MaxWave=7,WaveCost=12,MaxCount=2)					
.EnemyList=(EnemyType=AIType_Kantus,MinWave=8,WaveCost=12)
.EnemyList=(EnemyType=AIType_ChiggerBomb,MinWave=5,WaveCost=2)					
.EnemyList=(EnemyType=AIType_BoomerFlame,MinWave=3,MaxWave=6,WaveCost=12,MaxCount=1)					
