; Rain of death- boomshots and minigun boomers, lots of them 24+30=54pts
.EnemySquadList=(EnemyIndices=(18,18,16,16))
; Hunterfest- flame drones, hunters, grenadiers 14+6+6+10=36pts
;.EnemySquadList=(EnemyIndices=(15,15,3,3,4,4,11,11))
; BloodMount Attack 15+15+15=45pts
.EnemySquadList=(EnemyIndices=(19,19,19))
; Carnage Attack 15+15+12=42pts
