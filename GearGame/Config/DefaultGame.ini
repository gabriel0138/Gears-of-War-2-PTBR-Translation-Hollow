; Meatheads- butchers and sires 24+24=48pts
;.EnemySquadList=(EnemyIndices=(1,1,1,1,13,13,13,13))
; Meatheads Part 2- flail boomers and sires 42+24=66pts
;.EnemySquadList=(EnemyIndices=(12,12,12,14,14,14,14))
; Medium booms- grenadier group with wretches 21+10=31pts
.EnemySquadList=(EnemyIndices=(11,11,11,0,0,0,0,0))
; Ranged fuckers- kantus with snipers and theron 12+18+24=54pts
