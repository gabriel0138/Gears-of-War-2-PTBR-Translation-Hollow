.EnemyList=(EnemyType=AIType_BoomerGatling,MinWave=7,WaveCost=15,MinCount=1)					
.EnemyList=(EnemyType=AIType_Boomer,MinWave=5,MaxWave=6,WaveCost=9,MaxCount=2)					
.EnemyList=(EnemyType=AIType_Boomer,MinWave=7,WaveCost=9)
