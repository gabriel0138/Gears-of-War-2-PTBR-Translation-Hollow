[IpDrv.TcpNetDriver]
bClampListenServerTickRate=TRUE
// PC port: raised from the Xbox 360 defaults (45.0 tick / 10000 / 7000 bytes-sec) -
// those were tuned for 2008-era console hardware and shared/DSL-era home upload
// bandwidth on the P2P host. Modern PC hosting hardware and broadband can comfortably
// sustain a higher tick rate; the bandwidth caps were raised alongside it since a
// higher tick rate just gets throttled back down by a low per-connection byte cap
// otherwise.
NetServerMaxTickRate=60.0
ConnectionTimeout=45.0
InitialConnectTimeout=45.0
MaxClientRate=30000
MaxInternetClientRate=25000
ServerTravelPause=2.2

