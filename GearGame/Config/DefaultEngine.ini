[OnlineSubsystemSteamworks.OnlineSubsystemSteamworks]
; Protocol tag used to build/parse the join ("connect") URL for Steam invites and
; join-in-progress. Must be non-empty or GetServerLocation()/SetInviteInfo() can't
; round-trip the host address. Matches the GameSpy build's value.
LocalPlayerName=Player
LocationUrl=g2pc
+LocationUrlsForInvites=g2pc
; Steam game-server version string; required to publish a server on Steam.
GameVersion=1.0.0.0
; Steam mod-directory identifier passed to SetModDir(); also required to publish a
; server on Steam (see PublishSteamServer in UOnlineGameInterfaceSteamworks.cpp) -
; without it, CreateOnlineGame('Party'/'Game') fails outright and silently, which
; showed up as "Start Match"/party recreation just doing nothing after switching
; match type to/from Server Browser and back.
