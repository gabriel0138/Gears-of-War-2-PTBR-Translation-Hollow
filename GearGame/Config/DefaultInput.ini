MouseSensitivity=60

; PC port: BaseInput.ini's default Tilde binding opens the full debug console (arbitrary
; ConsoleCommand/exec dispatch, scrollback log). With the actual cheat/debug exec functions
; already compiled out for release (see GOW2_STRIPCHEATS), this is no longer a functional
; gate, just unnecessary exposure/clutter - disable it. Does NOT affect the Y/U chat typing
; bar (Talk()/TeamTalk() call Console.StartTyping() directly via GotoState('Typing'), a
; separate code path from this key).
[Engine.Console]
ConsoleKey=None
TypeKey=Underscore

[GearGame.GearPlayerInput]
RunWalkTransitionThreshold=0.75
TargetingModeViewScalePct=0.65
bAutoCenterPitch=TRUE
PitchAutoCenterDelay=2.0
PitchAutoCenterSpeed=0.5
PitchAutoCenterSpeedRoadieRun=1.75

