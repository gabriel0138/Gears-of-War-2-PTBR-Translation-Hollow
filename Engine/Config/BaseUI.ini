bAlwaysOpen=False

[Engine.UITabControl]
bAllowPagePreviews=true

[Engine.UIComp_DrawStringEditbox]
SelectionTextColor=(R=1.0,G=1.0,B=1.0,A=1.0)
SelectionBackgroundColor=(R=0.0,G=0.0,B=1.0,A=0.6)

[Engine.UICalloutButton]
