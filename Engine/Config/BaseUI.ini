[Engine.Subtitle]
bScaleSubtitles=True
SubtitleFontScale=2.2
UIScaleMultiplier=1.8
MaxSubtitleLines=4
SafeZoneX=0.85
SafeZoneY=0.85

[TextureStreaming]
